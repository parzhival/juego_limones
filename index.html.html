<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atrapar Limones</title>
  <link rel="stylesheet" href="limones.css"/>
  <script src="utils.js"></script>
</head>
<body onload="iniciar();">
  <div class="contenedor">
    <header class="header">
      <h1>Atrapar Limones 🍋</h1>
      <p class="subtitulo">Si del cielo te caen limones... ¡atrápalos todos!</p>
      <h2 class="autor">Autor: Joshua Vaca</h2>
    </header>

    <section class="juego">
      <canvas id="areaJuego" width="600" height="400"></canvas>
    </section>

    <section class="panel">
      <div class="card">
        <span class="label">Puntaje</span>
        <span id="txtPuntaje" class="valor">0</span>
      </div>
      <div class="card">
        <span class="label">Vidas</span>
        <span id="txtVidas" class="valor">3</span>
      </div>
    </section>

    <section class="botones">
      <button onclick="moverIzquierda();" class="btn">⬅ Izquierda</button>
      <button onclick="moverDerecha();" class="btn">Derecha ➡</button>
      <button onclick="reiniciar();" class="btn btn-reset">🔄 Reiniciar</button>
    </section>
  </div>

  <script src="limones.js"></script>
</body>
</html>
